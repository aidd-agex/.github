name: New Release
description: Create a new release for staging deployment
title: "[RELEASE] stg-YYYYMMDD"
labels: ["release", "staging"]
body:
  - type: markdown
    attributes:
      value: |
        ## Release Information
        This template is used to create a new staging release.
        
        **Instructions:**
        1. Update the title to match the release date: `[RELEASE] stg-YYYYMMDD`
        2. PRs must already be merged to `develop` branch
        3. If any services need only Nacos config updated in PROD (without code change), select them from the **Nacos Change Only Services** dropdown below, then manually trigger [Ninja Service Release](https://github.com/aidd-agex/gitops/actions/workflows/ninja-service-release.yml) with the same services in the `nacos-change-only-services` input
        4. Add label `release:plan` to trigger the automation
        5. The workflow will automatically:
           - Create branch `stg-YYYYMMDD` from `stg`
           - Merge `develop` branch into it
           - Detect all included PRs automatically
           - Generate release notes with PR details and authors
           - Create PR to merge back to `stg`

  - type: dropdown
    id: nacos-change-only-services
    attributes:
      label: Nacos Change Only Services
      description: |
        Select services that need nacos config updated in PROD **without** changing their code version.
        These services will have their nacos sync job re-run, and `nacosJobName` in their prod values.yaml will be updated.
      multiple: true
      options:
        - ninja-agent-store-service
        - ninja-api-service
        - ninja-audio-service
        - ninja-file-service
        - ninja-gateway
        - ninja-notification-service
        - ninja-schedule-service
        - ninja-user-service
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes (Optional)
      description: |
        Optional manual notes for reference. 
        Note: Release notes will be auto-generated from PR history by the workflow.
        This field is for additional context, breaking changes, or manual reminders.
      placeholder: |
        Optional: Any additional context, breaking changes, or important notes...
        
        The workflow will automatically generate release notes from merged PRs.
    validations:
      required: false
      
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-release Checklist
      options:
        - label: All PRs are already merged to `develop`
          required: true
        - label: All the dependencies of the PRs are already changed (e.g. Nacos, Database, etc.)
          required: true
        - label: All tests pass on develop
          required: true

