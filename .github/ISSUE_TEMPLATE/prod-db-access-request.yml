name: Prod DB Access Request
description: Request read or write access to production databases (Firestore / Redis / Cloud SQL)
title: "[Prod DB]: "
labels: [prod-db-request]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ## 🔒 Production Database Access Request
        Production databases (Firestore, Redis & Cloud SQL) are restricted to the Platform team. Use this form to request data access for debugging, investigation, or data fixes.
        
        **⚠️ Before submitting:** Confirm that this cannot be resolved using dev/stg environments.
        
        **👥 Approval flow:** Peer review (team member) → Team Lead approval → Platform team execution.
        
        **📋 Access policy:**
        - **Read requests:** You may be granted temporary read-only access, or Platform team can execute the query and post results.
        - **Write requests:** All write operations are executed **exclusively by Platform team members**. Developers will NOT be granted write access under any circumstances. Provide the exact query/script in this template and Platform team will execute it on your behalf.
        
        **🔄 Auto-revocation:** All non-platform prod DB read access is automatically revoked every day at 19:00 JST. If you need access beyond that, select the appropriate duration below.

  - type: input
    id: requester_email
    attributes:
      label: "Requester"
      description: "Email of the person who needs the database access"
      placeholder: "e.g., firstname.lastname@rakuten.com"
    validations:
      required: true

  - type: dropdown
    id: request_type
    attributes:
      label: Request Type
      description: "Read = query only (you may get temporary read access); Write = create/update/delete data (Platform team executes — no personal write access granted)"
      options:
        - Read
        - Write
    validations:
      required: true

  - type: dropdown
    id: datastore_type
    attributes:
      label: Data Store Type
      description: "Which type of production data store?"
      options:
        - Firestore
        - Redis (Memorystore)
        - Cloud SQL (PostgreSQL)
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Target Database / Instance
      description: "Which production database or Redis instance? Select 'Other' if not listed."
      options:
        - "Firestore: ai-service-prod"
        - "Firestore: memory-service-prod"
        - "Firestore: growthbook-prod"
        - "Redis: prod instance"
        - "Cloud SQL: prod-psql / litellm"
        - "Cloud SQL: prod-psql / avatar"
        - "Other (specify in Reason / Background)"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: "Critical = blocking production incident; High = same-day needed; Normal = can wait"
      options:
        - Normal
        - High
        - Critical (production incident)
    validations:
      required: true

  - type: dropdown
    id: access_duration
    attributes:
      label: "Access Duration"
      description: "For Read requests: how long do you need temporary read access? For Write requests: must select 'Platform execution only' — developers are not granted write access. All read access is auto-revoked daily at 19:00 JST."
      options:
        - "Platform execution only (no personal access needed)"
        - "Read only — Same day (revoked at tonight's 19:00 JST cleanup)"
        - "Read only — Multiple days (specify end date in field below)"
    validations:
      required: true

  - type: input
    id: access_expiry
    attributes:
      label: "Access Expiry Date (if multiple days)"
      description: "Only fill this if you selected 'Read only — Multiple days' above. Read access will be revoked on this date at 19:00 JST. Not applicable for write requests."
      placeholder: "e.g., 2026-03-21"

  - type: input
    id: peer_reviewer
    attributes:
      label: "Peer Reviewer"
      description: "@mention a team member who has reviewed your query/script and confirmed it is correct and safe"
      placeholder: "@peer-username"
    validations:
      required: true

  - type: dropdown
    id: tl_approval
    attributes:
      label: "Team Lead Approval"
      description: "Select the Team Lead who approved this request"
      options:
        - jie.meng@rakuten.com
        - hanlin.liu@rakuten.com
        - donghui.a.wang@rakuten.com
        - yuxi.wu@rakuten.com
        - yuan.ma@rakuten.com
    validations:
      required: true

  - type: input
    id: related_issue
    attributes:
      label: "Related Issue / Incident"
      description: "Link to the bug, incident, or ticket that triggered this request"
      placeholder: "e.g., ninja#1234 or incident URL"
    validations:
      required: true

  - type: dropdown
    id: release_related
    attributes:
      label: "Release Related?"
      description: "Is this request related to a release?"
      options:
        - "No"
        - "Yes - before release"
        - "Yes - after release"
    validations:
      required: true

  - type: input
    id: execution_time
    attributes:
      label: "Expected Execution Time"
      description: "When should this be executed?"
      placeholder: "e.g., ASAP, 2026-03-13 10:00 JST, next maintenance window"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: "Reason / Background"
      description: "Why do you need production data access? What are you investigating?"
      placeholder: |
        Describe the issue you're investigating and why prod access is needed.
        Include any relevant context (error logs, user reports, etc.)
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: markdown
    attributes:
      value: |
        ### 📖 Query Details
        
        **📎 Scripts & Queries can be provided as attachments.**
        For complex or multi-line scripts, attach the script file (.js / .sh / .txt) to this issue or send via email to the Platform team (peilin.zhai@rakuten.com, yuanhao.wu@rakuten.com, yang.f.yang@rakuten.com). This avoids formatting/copy-paste issues and allows direct execution.

  - type: textarea
    id: query
    attributes:
      label: "Query / Command"
      description: "Firestore: collection path or query. Redis: key pattern or command. Cloud SQL: SQL query. For complex scripts, write 'See attachment' and attach the file or send via email."
      placeholder: |
        Firestore example:
        db.collection('users').doc('abc123').collection('conversations').get()
        
        Redis example:
        GET user:abc123:profile
        HGETALL session:abc123
        
        Cloud SQL example:
        SELECT id, status FROM users WHERE created_at > '2026-01-01' LIMIT 100;
        
        Complex: See attachment query.js / query.sql (also sent via email)
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected_results
    attributes:
      label: "Expected Results"
      description: "What data do you expect to see? This helps us verify correctness."
      placeholder: "e.g., Should return 1 document with fields: name, email, status"
    validations:
      required: true

  - type: dropdown
    id: pii
    attributes:
      label: "Contains PII?"
      description: "Will the query results contain personally identifiable information?"
      options:
        - "No"
        - "Yes"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: markdown
    attributes:
      value: |
        ### ✏️ Write Request Details
        **Fill this section only if Request Type = Write.** Leave blank for read-only requests.
        
        **⚠️ All write operations are executed by Platform team members only.** Provide the exact query/script below — Platform team will execute it, verify results, and post them on this issue.

  - type: textarea
    id: pre_execution_query
    attributes:
      label: "Pre-execution Verification & Expected Result"
      description: "Query/command to verify current state BEFORE modification. Can paste here or write 'See attachment'."
      placeholder: |
        Firestore:
        Query: db.collection('users').where('status', '==', 'INVALID').get()
        Expected: 15 documents with status=INVALID
        
        Redis:
        Command: GET user:abc123:profile
        Expected: {"name":"old_name","status":"active"}
        
        Cloud SQL:
        Query: SELECT count(*) FROM users WHERE status = 'INVALID';
        Expected: 15 rows
        
        Or: See attachment pre-check.js / pre-check.sql (also sent via email)
      render: shell

  - type: textarea
    id: modification_script
    attributes:
      label: "Modification Script / Command"
      description: "Exact script, Redis command, or SQL statement to execute. For complex scripts, attach the file (.js/.sh/.sql) to this issue or send via email — we will execute the file directly."
      placeholder: |
        Firestore:
        db.collection('users').where('status', '==', 'INVALID').update({status: 'ACTIVE'})
        
        Redis:
        DEL user:abc123:stale_cache
        SET user:abc123:profile '{"name":"new_name"}' EX 3600
        
        Cloud SQL:
        UPDATE users SET status = 'ACTIVE' WHERE status = 'INVALID';
        
        Complex: See attachment fix-status.js / fix-status.sql (also sent via email)
      render: shell

  - type: textarea
    id: post_execution_query
    attributes:
      label: "Post-execution Verification & Expected Result"
      description: "Query/command to verify state AFTER modification. Can paste here or write 'See attachment'."
      placeholder: |
        Firestore:
        Query: db.collection('users').where('status', '==', 'INVALID').get()
        Expected: 0 documents
        
        Redis:
        Command: GET user:abc123:stale_cache
        Expected: (nil)
        
        Cloud SQL:
        Query: SELECT count(*) FROM users WHERE status = 'INVALID';
        Expected: 0 rows
        
        Or: See attachment post-check.js / post-check.sql (also sent via email)
      render: shell

  - type: dropdown
    id: tested_lower_env
    attributes:
      label: "Tested in Lower Environment?"
      description: "Has this script been tested in dev or stg?"
      options:
        - "N/A (read-only request)"
        - "Yes - tested in dev"
        - "Yes - tested in stg"
        - "Yes - tested in both dev and stg"
        - "No (please explain why)"
    validations:
      required: true

  - type: textarea
    id: test_evidence
    attributes:
      label: "Test Evidence"
      description: "For write requests: attach screenshots or logs from lower environment testing"
      placeholder: "Paste screenshots or test output here"

  - type: textarea
    id: rollback_plan
    attributes:
      label: "Rollback Plan"
      description: "How to revert if something goes wrong. For rollback scripts, attach the file or send via email."
      placeholder: |
        Firestore:
        1. Affected document IDs: see attachment affected-ids.txt
        2. Rollback script: see attachment rollback.js (also sent via email)
        
        Redis:
        1. Cache will auto-rebuild on next access; no data loss
        2. Or: SET user:abc123:profile '<original_value>' EX 3600
        
        Cloud SQL:
        1. Backup table before modification: CREATE TABLE users_backup AS SELECT * FROM users WHERE status = 'INVALID';
        2. Rollback: UPDATE users SET status = 'INVALID' FROM users_backup WHERE users.id = users_backup.id;
      render: shell

  - type: input
    id: affected_scope
    attributes:
      label: "Affected Scope"
      description: "For write requests: how many documents/keys/records will be affected?"
      placeholder: "e.g., 15 Firestore documents, 50 Redis keys, 100 SQL rows, 1 user record"

  - type: markdown
    attributes:
      value: "---"

  - type: markdown
    attributes:
      value: |
        ### ℹ️ Review Checklist (for Platform team)
        - [ ] Request is necessary (cannot be resolved in dev/stg)
        - [ ] Query scope is appropriate (not overly broad)
        - [ ] Peer reviewed by team member
        - [ ] Team Lead has approved
        - [ ] (Write) Script tested in lower environment
        - [ ] (Write) Rollback plan is viable
        - [ ] (Write) Pre/post verification queries provided
        - [ ] (Write) Platform team executed script and posted pre/post verification results
        - [ ] (Read) Temporary read-only access granted (if personal access requested)
        - [ ] (Read) Access revoked / confirmed auto-revoked
